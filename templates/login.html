<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Painel Dona Sogra</title>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            /* Padrão sutil de fundo */
            background-image: radial-gradient(circle at 20% 20%, rgba(192, 57, 43, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(240, 165, 0, 0.10) 0%, transparent 50%);
        }

        .login-card {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-area img {
            height: 70px;
            width: auto;
            object-fit: contain;
        }

        .logo-area h1 {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 900;
            margin-top: 0.75rem;
            letter-spacing: 0.02em;
        }

        .logo-area p {
            color: #F0A500;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 0.2rem;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #333, transparent);
            margin-bottom: 1.75rem;
        }

        label {
            display: block;
            color: #aaa;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 1.1rem;
        }

        input:focus {
            outline: none;
            border-color: #C0392B;
            box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #C0392B, #a93226);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            margin-top: 0.25rem;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* Alertas Flash */
        .flash {
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 1.1rem;
            font-weight: 600;
        }

        .flash.error {
            background: rgba(192, 57, 43, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(192, 57, 43, 0.3);
        }

        .flash.warning {
            background: rgba(240, 165, 0, 0.12);
            color: #F0A500;
            border: 1px solid rgba(240, 165, 0, 0.3);
        }

        .flash.info {
            background: rgba(52, 152, 219, 0.12);
            color: #5dade2;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #555;
            font-size: 0.82rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #F0A500;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <!-- Logo -->
        <div class="logo-area">
            <img src="/img/logo.png" alt="Dona Sogra" />
            <h1>Painel Administrativo</h1>
            <p>Salgados Dona Sogra</p>
        </div>

        <div class="divider"></div>

        <!-- Mensagens Flash (erros de login, avisos de sessão, etc.) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
        {% endfor %}
        {% endwith %}

        <!-- Formulário de Login -->
        <form method="POST" action="{{ url_for('auth.login') }}">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required
                autofocus />

            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"
                required />

            <button type="submit" class="btn-login">Entrar no Painel →</button>
        </form>

        <a href="/" class="back-link">← Voltar à loja</a>
    </div>

</body>

</html>
